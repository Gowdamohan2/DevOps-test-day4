name: Dev Serverless Deploy

on:
  push:
    branches:
      - develop
#llm
permissions:  
  id-token: write
  contents: read

env:
  AWS_REGION: ap-south-1
  ECR_REPO: backend-lambda

jobs:

  # -------------------------------
  # 1️⃣ FRONTEND BUILD & DEPLOY
  # -------------------------------
  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::<ACCOUNT_ID>:role/Dev-Serverless-Deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload frontend to S3
        run: |
          aws s3 sync frontend/dist s3://${{ secrets.FRONTEND_BUCKET }} --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

  # -------------------------------
  # 2️⃣ BACKEND BUILD, PUSH & DEPLOY
  # -------------------------------
  backend:
    runs-on: ubuntu-latest
    needs: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::<ACCOUNT_ID>:role/Dev-Serverless-Deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push backend Docker image
        run: |
          IMAGE_URI=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO }}:dev-${{ github.sha }}
          docker build -t $IMAGE_URI backend/
          docker push $IMAGE_URI
          echo "IMAGE_URI=$IMAGE_URI" >> $GITHUB_ENV

      - name: Deploy image to Lambda
        run: |
          aws lambda update-function-code \
            --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }} \
            --image-uri $IMAGE_URI

  # -------------------------------
  # 3️⃣ DYNAMODB TABLES
  # -------------------------------
  dynamodb:
    runs-on: ubuntu-latest
    needs: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::<ACCOUNT_ID>:role/Dev-Serverless-Deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy DynamoDB tables
        run: |
          aws cloudformation deploy \
            --stack-name dev-dynamodb \
            --template-file infra/dynamodb.yaml \
            --no-fail-on-empty-changeset
